<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="bootstrap/css/bootstrap.css" />
    <link rel="stylesheet" href="bootstrap-custom.css" />
    <link rel="stylesheet" href="bootstrap-components.css" />
    <title>Payment</title>
  </head>
  <body>
    <div class="login-container">
      <div class="login-card border shadow">
        <div class="text-center mb-4">
          <img class="logo py-3" src="images/logo_resized.png" alt="#" />
          <h2 class="mb-1">Card Payment</h2>
          <p class="ps-font-sm text-ps-grey mb-0">
            Enter your card details to complete the purchase
          </p>
        </div>

        <form>
          <div class="mb-3">
            <label for="cardNumber" class="form-label">Card Number</label>
            <input
              type="text"
              class="form-control"
              id="cardNumber"
              placeholder="0000 0000 0000 0000"
              maxlength="19"
            />
          </div>

          <div class="row mb-3">
            <div class="col-6">
              <label for="expiry" class="form-label">Expiry Date</label>
              <input
                type="text"
                class="form-control"
                id="expiry"
                placeholder="MM / YY"
                maxlength="7"
              />
            </div>
            <div class="col-6">
              <label for="cvv" class="form-label">CVV</label>
              <input
                type="text"
                class="form-control"
                id="cvv"
                placeholder="•••"
                maxlength="4"
              />
            </div>
          </div>

          <div class="mb-3">
            <label for="cardName" class="form-label">Full Name</label>
            <input
              type="text"
              class="form-control"
              id="cardName"
              placeholder="Name as on card"/>
          </div>

          <button type="submit" class="btn btn-primary w-100 mb-3">Pay Now</button>
        </form>

        <div class="text-center">
          <a href="#" class="ps-payment-secure-link">Your payment is secured with encryption</a>
        </div>
      </div>
    </div>
  </body>
</html>
