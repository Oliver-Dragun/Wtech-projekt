<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="bootstrap/css/bootstrap.css" />
    <link rel="stylesheet" href="bootstrap-custom.css" />
    <link rel="stylesheet" href="bootstrap-components.css" />
    <title>Edit Profile</title>
  </head>
  <body>
    <div class="login-container">
      <div class="login-card border shadow">
        <div class="text-center mb-3">
          <img class="logo py-2" src="images/logo_resized.png" />
          <h2 class="mb-3">Edit Profile</h2>
        </div>

        <form>
          <div class="row g-2 mb-2">
            <div class="col-6">
              <label for="firstName" class="form-label">First Name</label>
              <input type="text" class="ps-input" id="firstName" value="John" />
            </div>
            <div class="col-6">
              <label for="lastName" class="form-label">Last Name</label>
              <input type="text" class="ps-input" id="lastName" value="Doe" />
            </div>
          </div>

          <div class="mb-2">
            <label for="email" class="form-label">Email</label>
            <input
              type="email"
              class="ps-input"
              id="email"
              value="john@example.com"
            />
          </div>

          <div class="mb-2">
            <label for="phone" class="form-label">Phone</label>
            <input
              type="tel"
              class="ps-input"
              id="phone"
              value="+123 234 567 890"
            />
          </div>

          <div class="mb-2">
            <label for="street" class="form-label">Street</label>
            <input
              type="text"
              class="ps-input"
              id="street"
              value="123 Magic Street"
            />
          </div>

          <div class="row g-2 mb-2">
            <div class="col-8">
              <label for="city" class="form-label">City</label>
              <input
                type="text"
                class="ps-input"
                id="city"
                value="Wizard City"
              />
            </div>
            <div class="col-4">
              <label for="areaCode" class="form-label">Area Code</label>
              <input type="text" class="ps-input" id="areaCode" value="12345" />
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100 mb-3 py-2">
            Save Changes
          </button>
        </form>

        <div class="text-center">
          <a
            href="profile.html"
            style="opacity: 0.6; text-decoration: underline"
            >Cancel</a
          >
        </div>
      </div>
    </div>
  </body>
</html>
